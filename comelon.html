<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juego Adrián Pro</title>
    <style>
        /* BLOQUEO TOTAL: El teléfono no podrá mover la página */
        html, body { 
            position: fixed; overflow: hidden; width: 100%; height: 100%; 
            margin: 0; padding: 0; touch-action: none; -webkit-overflow-scrolling: none;
        }
        
        body { 
            font-family: sans-serif; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), url('fondo.jpg');
            background-size: cover;
        }

        #btn-musica { position: fixed; top: 10px; right: 10px; z-index: 1000; padding: 10px; border-radius: 20px; border: 2px solid #2b5a9e; background: white; font-weight: bold; }
        #marcador { font-size: 24px; font-weight: bold; background: white; padding: 10px 30px; border-radius: 30px; border: 4px solid #2b5a9e; color: #2b5a9e; margin-bottom: 10px; }
        #mensaje { background: rgba(255,255,255,0.8); padding: 5px 15px; border-radius: 10px; margin-bottom: 10px; }
        #caja-personaje { width: 220px; height: 260px; border: 6px solid #2b5a9e; background: white; border-radius: 25px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #personaje-img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        .contenedor-objetos { margin-top: 30px; display: flex; gap: 40px; justify-content: center; width: 100%; height: 100px; }
        
        .circulo { 
            width: 90px; height: 90px; border: 4px solid #2b5a9e; border-radius: 50%; 
            background: white; display: flex; align-items: center; justify-content: center; 
            position: absolute; z-index: 100; touch-action: none;
        }
        .circulo img { width: 70%; pointer-events: none; }
    </style>
</head>
<body>

    <button id="btn-musica" onclick="controlarMusica()">🎵 Música: OFF</button>
    <audio id="audioFondo" src="musica.mp3" loop></audio>

    <div id="marcador">Puntos: <span id="puntos">0</span></div>
    <h2 id="mensaje">Adrián tiene hambre</h2>
    
    <div id="caja-personaje">
        <img src="normal.jpg" id="personaje-img">
    </div>
