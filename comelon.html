

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juego del Comelón - Adrián</title>
    <style>
        body { 
            margin: 0; padding: 0; font-family: sans-serif; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), url('fondo.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow: hidden; touch-action: none; /* Evita que la pantalla se mueva al jugar */
        }
        #btn-musica {
            position: fixed; top: 10px; right: 10px; padding: 10px;
            background: white; border: 2px solid #2b5a9e; border-radius: 20px;
            z-index: 1000; font-size: 14px;
        }
        #contenedor-juego { display: flex; flex-direction: column; align-items: center; z-index: 10; }
        #marcador { font-size: 24px; font-weight: bold; margin-bottom: 15px; background: white; padding: 8px 25px; border-radius: 30px; border: 3px solid #2b5a9e; color: #2b5a9e; }
        #mensaje { background: rgba(255, 255, 255, 0.8); padding: 5px 15px; border-radius: 10px; margin-bottom: 10px; font-size: 18px; }
        #caja-personaje { width: 220px; height: 260px; border: 6px solid #2b5a9e; background: white; border-radius: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #personaje-img { width: 100%; height: 100%; object-fit: cover; }
        #contenedor-objetos { display: flex; gap: 30px; margin-top: 30px; }
        .circulo { width: 90px; height: 90px; border: 4px solid #2b5a9e; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; touch-action: none; }
        .circulo img { width: 80%; height: 80%; object-fit: contain; pointer-events: none; }
    </style>
</head>
<body>

    <button id="btn-musica" onclick="controlarMusica()">🎵 Música: OFF</button>
    <audio id="audioFondo" src="musica.mp3" loop></audio>

    <div id="contenedor-juego">
        <div id="marcador">Puntos: <span id="puntos">0</span></div>
        <h2 id="mensaje">Adrián tiene hambre</h2>
        <div id="caja-personaje" id="target">
            <img src="normal.jpg" id="personaje-img">
        </div>
        <div id="contenedor-objetos">
            <div class="circulo" id="c0"><img src="" id="img0"></div>
            <div class="circulo" id="c1"><img src="" id="img1"></div>
        </div>
    </div>

    <script>
        let pts = 0;
        const pImg = document.getElementById('personaje-img');
        const ptsTxt = document.getElementById('puntos');
        const msg = document.getElementById('mensaje');
        const caja = document.getElementById('caja-personaje');
        
        const musica = document.getElementById('audioFondo');
        musica.volume = 0.15;
        const sonidoRico = new Audio('rico.mp3');
        const sonidoAsco = new Audio('asco.mp3');

        function controlarMusica() {
            if (musica.paused) { musica.play(); document.getElementById('btn-musica').innerText = "🎵 Música: ON"; }
            else { musica.pause(); document.getElementById('btn-musica').innerText = "🎵 Música: OFF"; }
        }

        let opciones = [];
        function mezclar() {
            const c = Math.random() > 0.5 ? 'comida1.jpg' : 'comida2.jpg';
            const v = Math.random() > 0.5 ? 'veneno1.jpg' : 'veneno2.jpg';
            opciones = [{s:c, t:'bueno'}, {s:v, t:'malo'}].sort(() => Math.random() - 0.5);
            document.getElementById('img0').src = opciones[0].s;
            document.getElementById('img1').src = opciones[1].s;
            document.getElementById('c0').style.visibility = 'visible';
            document.getElementById('c1').style.visibility = 'visible';
            document.getElementById('c0').style.transform = "translate(0,0)";
            document.getElementById('c1').style.transform = "translate(0,0)";
        }

        // --- LÓGICA TÁCTIL (PARA CELULAR) ---
        function setupTouch(element, index) {
            let startX, startY;
            element.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                startX = touch.clientX;
                startY = touch.clientY;
            }, {passive: false});

            element.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const deltaX = touch.clientX - startX;
                const deltaY = touch.clientY - startY;
                element.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
            }, {passive: false});

            element.addEventListener('touchend', (e) => {
                const touch = e.changedTouches[0];
                const targetRect = caja.getBoundingClientRect();
                
                if (touch.clientX > targetRect.left && touch.clientX < targetRect.right &&
                    touch.clientY > targetRect.top && touch.clientY < targetRect.bottom) {
                    procesarEleccion(opciones[index]);
                } else {
                    element.style.transform = "translate(0,0)";
                }
            });
        }

        function procesarEleccion(sel) {
            document.getElementById('c0').style.visibility = 'hidden';
            document.getElementById('c1').style.visibility = 'hidden';
            if (sel.t === 'bueno') {
                pts += 10; pImg.src = 'comiendo.jpg'; msg.innerText = "¡QUÉ RICO! 😋";
                sonidoRico.play().catch(()=>{});
            } else {
                pts -= 20; pImg.src = 'enfermo.jpg'; msg.innerText = "¡PUAJ! 🤢";
                sonidoAsco.play().catch(()=>{});
            }
            ptsTxt.innerText = pts;
            setTimeout(() => { pImg.src = 'normal.jpg'; msg.innerText = "Adrián tiene hambre"; mezclar(); }, 1500);
        }

        setupTouch(document.getElementById('c0'), 0);
        setupTouch(document.getElementById('c1'), 1);
        mezclar();
    </script>
</body>
</html>
