<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juego del Comelón - Adrián Profesional</title>
    <style>
        /* BLOQUEO CRÍTICO: Evita que la tableta mueva la pantalla */
        * { 
            touch-action: none; 
            user-select: none; 
            -webkit-user-drag: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            margin: 0; padding: 0; font-family: 'Arial Rounded MT Bold', sans-serif; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.7)), url('fondo.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow: hidden;
        }

        #btn-musica {
            position: fixed; top: 15px; right: 15px; padding: 10px 20px;
            background: white; border: 3px solid #2b5a9e; border-radius: 25px;
            z-index: 2000; font-weight: bold; cursor: pointer;
        }

        #marcador { 
            font-size: 28px; font-weight: bold; margin-bottom: 15px; 
            background: white; padding: 10px 35px; border-radius: 35px; 
            border: 4px solid #2b5a9e; color: #2b5a9e; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #mensaje { 
            background: rgba(255, 255, 255, 0.9); padding: 8px 25px; 
            border-radius: 15px; margin-bottom: 20px; font-size: 22px; 
            color: #333; min-width: 250px; text-align: center;
        }

        #caja-personaje { 
            width: 260px; height: 300px; border: 8px solid #2b5a9e; 
            background: white; border-radius: 30px; overflow: hidden; 
            display: flex; align-items: center; justify-content: center;
            position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        #personaje-img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        .contenedor-objetos { 
            margin-top: 50px; display: flex; gap: 60px; justify-content: center; width: 100%;
        }

        .circulo { 
            width: 115px; height: 115px; border: 6px solid #2b5a9e; 
            border-radius: 50%; background: white; display: flex; 
            align-items: center; justify-content: center; 
            position: relative; z-index: 100;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            cursor: grab;
            transition: transform 0.1s; /* Pequeño efecto al tocar */
        }

        .circulo img { width: 75%; height: 75%; object-fit: contain; pointer-events: none; }
    </style>
</head>
<body>

    <button id="btn-musica" onclick="controlarMusica()">🎵 Música: OFF</button>
    <audio id="audioFondo" src="musica.mp3" loop></audio>

    <div id="marcador">Puntos: <span id="puntos">0</span></div>
    <h2 id="mensaje">Adrián tiene hambre</h2>
    
    <div id="caja-personaje" id="boca">
        <img src="normal.jpg" id="personaje-img">
    </div>

    <div class="contenedor-objetos">
        <div class="circulo" id="obj0"><img src="" id="img0"></div>
        <div class="circulo" id="obj1"><img src="" id="img1"></div>
    </div>

    <script>
        let pts = 0;
        const pImg = document.getElementById('personaje-img');
        const ptsTxt = document.getElementById('puntos');
        const msg = document.getElementById('mensaje');
        const boca = document.getElementById('caja-personaje');
        
        const musica = document.getElementById('audioFondo');
        const sonidoRico = new Audio('rico.mp3');
        const sonidoAsco = new Audio('asco.mp3');
        musica.volume = 0.15;

        function controlarMusica() {
            if (musica.paused) { musica.play(); document.getElementById('btn-musica').innerText = "🎵 Música: ON"; }
            else { musica.pause(); document.getElementById('btn-musica').innerText = "🎵 Música: OFF"; }
        }

        let opciones = [];

        function mezclar() {
            const c = Math.random() > 0.5 ? 'comida1.jpg' : 'comida2.jpg';
            const v = Math.random() > 0.5 ? 'veneno1.jpg' : 'veneno2.jpg';
            opciones = [{s:c, t:'bueno'}, {s:v, t:'malo'}].sort(() => Math.random() - 0.5);
            
            document.getElementById('img0').src = opciones[0].s;
            document.getElementById('img1').src = opciones[1].s;
            
            [document.getElementById('obj0'), document.getElementById('obj1')].forEach(el => {
                el.style.visibility = 'visible';
                el.style.transform = 'translate(0px, 0px)';
            });
        }

        // --- MOTOR DE ARRASTRE PROFESIONAL ---
        function activarArrastre(el, index) {
            let activo = false;
            let actualX, actualY, inicialX, inicialY;
            let xOffset = 0, yOffset = 0;

            el.addEventListener("touchstart", dragStart, {passive: false});
            el.addEventListener("touchend", dragEnd, {passive: false});
            el.addEventListener("touchmove", drag, {passive: false});

            function dragStart(e) {
                inicialX = e.touches[0].clientX - xOffset;
                inicialY = e.touches[0].clientY - yOffset;
                if (e.target === el || el.contains(e.target)) { activo = true; }
                el.style.transition = "none";
            }

            function drag(e) {
                if (activo) {
                    e.preventDefault();
                    actualX = e.touches[0].clientX - inicialX;
                    actualY = e.touches[0].clientY - inicialY;
                    xOffset = actualX;
                    yOffset = actualY;
                    setTranslate(actualX, actualY, el);
                }
            }

            function dragEnd(e) {
                activo = false;
                const rectBoca = boca.getBoundingClientRect();
                const rectObj = el.getBoundingClientRect();

                // Verificamos si el centro del objeto está dentro de la caja de Adrián
                const centroX = rectObj.left + rectObj.width / 2;
                const centroY = rectObj.top + rectObj.height / 2;

                if (centroX > rectBoca.left && centroX < rectBoca.right &&
                    centroY > rectBoca.top && centroY < rectBoca.bottom) {
                    procesar(opciones[index]);
                    resetPos();
                } else {
                    el.style.transition = "transform 0.3s ease";
                    resetPos();
                }
            }

            function setTranslate(xPos, yPos, item) {
                item.style.transform = "translate3d(" + xPos + "px, " + yPos + "px, 0)";
            }

            function resetPos() {
                xOffset = 0; yOffset = 0;
                el.style.transform = "translate3d(0, 0, 0)";
            }
        }

        function procesar(sel) {
            document.getElementById('obj0').style.visibility = 'hidden';
            document.getElementById('obj1').style.visibility = 'hidden';
            
            if (sel.t === 'bueno') {
                pts += 10; pImg.src = 'comiendo.jpg'; msg.innerText = "¡QUÉ RICO! 😋";
                sonidoRico.play().catch(()=>{});
            } else {
                pts -= 20; pImg.src = 'enfermo.jpg'; msg.innerText = "¡PUAJ! 🤢";
                sonidoAsco.play().catch(()=>{});
            }
            ptsTxt.innerText = pts;
            setTimeout(() => {
                pImg.src = 'normal.jpg';
                msg.innerText = "Adrián tiene hambre";
                mezclar();
            }, 1500);
        }

        activarArrastre(document.getElementById('obj0'), 0);
        activarArrastre(document.getElementById('obj1'), 1);
        mezclar();
    </script>
</body>
</html>
